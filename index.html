<!DOCTYPE html>
<html>

    

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrappy's Randomized Oc Decider</title>
</head>

<body style="
background:#101820;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:15px;
">

<h1 style="font-size:clamp(24px,6vw,48px);">
ʕノ•ᴥ•ʔノ SCRAPPY'S RANDOMIZED OC DECIDER
</h1>

<p>
Can't decide who to attack?<br>
Let the fates decide for you!
</p>

<img
id="portrait"
src="images/scrap.png"
style="
width:min(300px, 70vw);
height:min(300px, 75vw);
border-radius:15px;
border:4px solid #2bb6a8;
"
>

<div
id="namebox"
style="
margin-top:20px;
font-size:clamp(22px,5vw,32px);
font-weight:bold;
"
>
SCANNING DATABASE...
</div>

<br>

<button
id="rollButton"
onclick="lockTarget()"
style="
background:#2bb6a8;
color:white;
border:none;
padding:16px 32px;
font-size:clamp(18px,4vw,22px);
border-radius:10px;
"
>
🖌️ Give Me a Target
</button>

<div
id="linkbox"
style="
margin-top:20px;
"
>
</div>

<script>

const characters = [

{
name:"Scrap",
url:"https://artfight.net/character/1944744.scrap",
image:"images/scrap.png"
},

{
name:"Leon",
url:"https://artfight.net/character/1238291.leon",
image:"images/leon.png"
},

{
name:"Bo the Pizza Delivery Guy",
url:"https://artfight.net/character/2026175.bo-the-pizza-delivery-guy",
image:"images/bo.png"
},

{
name:"Max",
url:"https://artfight.net/character/1819259.max",
image:"images/max.png"
},

{
name:"Woof",
url:"https://artfight.net/character/3252313.woof",
image:"images/woof.png"
},

{
name:"Renwick the Cutthroat Captain",
url:"https://artfight.net/character/3970912.renwick-the-cutthroat-captain",
image:"images/renwick.png"
},

{
name:"Scrap (Animatronic Version)",
url:"https://artfight.net/character/4111662.scrap-animatronic-version",
image:"images/animatronic_scrap.png"
},

{
name:"Thunder Steelstrike",
url:"https://artfight.net/character/4111906.thunder-steelstrike",
image:"images/thunder.png"
},

{
name:"Orvyn the Blacksmith",
url:"https://artfight.net/character/4508183.orvyn-the-blacksmith",
image:"images/orvyn.png"
},

{
name:"Bob",
url:"https://artfight.net/character/4855023.bob",
image:"images/bob.png"
},
    {
name:"Amira",
url:"https://artfight.net/character/8655868.amira",
image:"images/amira.png"
},
    {
name:"Xander",
url:"https://artfight.net/character/8656844.xander",
image:"images/xander.png"
}

];

let previousCharacter = null;
let lastLockedCharacter = null;

let spinSpeed = 100;
let isSlowingDown = false;
let spinTimeout = null;
let deck = [];
let deckIndex = 0;

    function shuffleDeck() {

    deck = [...characters];

    for (
        let i = deck.length - 1;
        i > 0;
        i--
    ) {

        const j =
            Math.floor(
                Math.random() *
                (i + 1)
            );

        [
            deck[i],
            deck[j]
        ] =
        [
            deck[j],
            deck[i]
        ];

    }

    deckIndex = 0;

}

function getRandomCharacter() {

    let chosen;

    do {

        chosen =
            characters[
                Math.floor(
                    Math.random() *
                    characters.length
                )
            ];

    } while (
        previousCharacter &&
        chosen.name === previousCharacter.name
    );

    previousCharacter = chosen;

    return chosen;

}

function displayCharacter(character) {

    document.getElementById(
        "portrait"
    ).src = character.image;

}

    function getDeckCharacter() {

    const chosen =
        deck[deckIndex];

    deckIndex++;

    if (
        deckIndex >= deck.length
    ) {

        deckIndex = 0;

    }

    return chosen;

}

function spin() {

    let chosen;

    if (isSlowingDown) {

        chosen =
            getRandomCharacter();

    } else {

        chosen =
            getDeckCharacter();

    }

    displayCharacter(
        chosen
    );

    if (isSlowingDown) {

        spinSpeed += 25;

        if (
            spinSpeed > 300 &&
            document.getElementById(
                "namebox"
            ).innerText !==
            "The doodles are debating..."
        ) {

            document.getElementById(
                "namebox"
            ).innerText =
                "Consulting the fates...";

        }

        if (spinSpeed >= 450) {

            finishRoll();
            return;

        }

    }

    spinTimeout =
        setTimeout(
            spin,
            spinSpeed
        );

}

function lockTarget() {

    if (isSlowingDown) return;

    isSlowingDown = true;

    document.getElementById(
        "rollButton"
    ).style.display =
        "none";

    document.getElementById(
        "namebox"
    ).innerText =
        "Looking for candidates...";

}

function finishRoll() {

    clearTimeout(
        spinTimeout
    );

    document.getElementById(
        "namebox"
    ).innerText =
        "The fates have decided...";

    setTimeout(
        revealWinner,
        1000
    );

}

function revealWinner() {

    let winner;

    do {

        winner =
            getRandomCharacter();

    } while (

        lastLockedCharacter &&
        winner.name ===
        lastLockedCharacter.name

    );

    lastLockedCharacter = winner;

    document.getElementById(
        "portrait"
    ).src =
        winner.image;

    document.getElementById(
        "namebox"
    ).innerHTML =

    `
    <div style="
    font-size:24px;
    color:white;
    ">
    ${winner.name}
    </div>
    `;

    document.getElementById(
        "linkbox"
    ).innerHTML =

    `
    <a
    href="${winner.url}"
    style="
    background:#3b82f6;
    color:white;
    padding:14px 30px;
    border-radius:10px;
    text-decoration:none;
    display:inline-block;
    font-size:20px;
    margin-bottom:12px;
    ">
    View Character
    </a>

    <br>

    <button
    onclick="reroll()"
    style="
    background:#2bb6a8;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:12px;
    font-size:16px;
    font-weight:normal;
    cursor:pointer;
    ">
    🔄 Roll Again
    </button>
    `;

}

function reroll() {

    clearTimeout(
        spinTimeout
    );

    document.getElementById(
        "linkbox"
    ).innerHTML = "";

    document.getElementById(
        "namebox"
    ).innerText =
        "Digging through character pile...";

    spinSpeed = 100;

isSlowingDown = false;

document.getElementById(
    "rollButton"
).style.display =
    "inline-block";

shuffleDeck();

spin();

}

function preloadImages(callback) {

    let loaded = 0;

    characters.forEach(character => {

        const img = new Image();

        img.onload = () => {

            loaded++;

            if (loaded === characters.length) {
                callback();
            }

        };

        img.onerror = () => {

            loaded++;

            if (loaded === characters.length) {
                callback();
            }

        };

        img.src = character.image;

    });

}

document.getElementById(
    "namebox"
).innerText =
    "Loading character database...";

preloadImages(() => {

    document.getElementById(
        "namebox"
    ).innerText =
        "Digging through character pile...";

    shuffleDeck();

    spin();

});

</script>

    </body>
</html>
