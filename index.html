<script>

const characters = [

{
name:"Scrap",
url:"https://artfight.net/character/1944744.scrap",
image:"images/scrap.png"
},

{
name:"Leon",
url:"https://artfight.net/character/1238291.leon",
image:"images/leon.png"
},

{
name:"Bo the Pizza Delivery Guy",
url:"https://artfight.net/character/2026175.bo-the-pizza-delivery-guy",
image:"images/bo.png"
},

{
name:"Max",
url:"https://artfight.net/character/1819259.max",
image:"images/max.png"
},

{
name:"Woof",
url:"https://artfight.net/character/3252313.woof",
image:"images/woof.png"
},

{
name:"Renwick the Cutthroat Captain",
url:"https://artfight.net/character/3970912.renwick-the-cutthroat-captain",
image:"images/renwick.png"
},

{
name:"Scrap (Animatronic Version)",
url:"https://artfight.net/character/4111662.scrap-animatronic-version",
image:"images/animatronic_scrap.png"
},

{
name:"Thunder Steelstrike",
url:"https://artfight.net/character/4111906.thunder-steelstrike",
image:"images/thunder.png"
},

{
name:"Orvyn the Blacksmith",
url:"https://artfight.net/character/4508183.orvyn-the-blacksmith",
image:"images/orvyn.png"
},

{
name:"Bob",
url:"https://artfight.net/character/4855023.bob",
image:"images/bob.png"
}

];

let previousCharacter = null;
let lastLockedCharacter = null;

let spinSpeed = 100;
let isSlowingDown = false;
let spinTimeout = null;

function getRandomCharacter() {

    let chosen;

    do {

        chosen =
            characters[
                Math.floor(
                    Math.random() *
                    characters.length
                )
            ];

    } while (
        previousCharacter &&
        chosen.name === previousCharacter.name
    );

    previousCharacter = chosen;

    return chosen;

}

function displayCharacter(character) {

    document.getElementById(
        "portrait"
    ).src = character.image;

}

function spin() {

    displayCharacter(
        getRandomCharacter()
    );

    if (isSlowingDown) {

        spinSpeed += 35;

        if (
            spinSpeed > 180 &&
            document.getElementById(
                "namebox"
            ).innerText !==
            "The doodles are debating..."
        ) {

            document.getElementById(
                "namebox"
            ).innerText =
                "The doodles are debating...";

        }

        if (spinSpeed >= 350) {

            finishRoll();
            return;

        }

    }

    spinTimeout =
        setTimeout(
            spin,
            spinSpeed
        );

}

function lockTarget() {

    if (isSlowingDown) return;

    isSlowingDown = true;

    document.getElementById(
        "rollButton"
    ).style.display =
        "none";

    document.getElementById(
        "namebox"
    ).innerText =
        "Consulting the doodles...";

}

function finishRoll() {

    clearTimeout(
        spinTimeout
    );

    document.getElementById(
        "namebox"
    ).innerText =
        "Almost decided...";

    setTimeout(
        revealWinner,
        800
    );

}

function revealWinner() {

    let winner;

    do {

        winner =
            getRandomCharacter();

    } while (

        lastLockedCharacter &&
        winner.name ===
        lastLockedCharacter.name

    );

    lastLockedCharacter = winner;

    document.getElementById(
        "portrait"
    ).src =
        winner.image;

    document.getElementById(
        "namebox"
    ).innerHTML =

    `
    <div style="
    font-size:30px;
    color:#2bb6a8;
    margin-bottom:10px;
    font-weight:bold;
    ">
    THE FATES HAVE SPOKEN!
    </div>

    <div style="
    font-size:24px;
    color:white;
    ">
    ${winner.name}
    </div>
    `;

    document.getElementById(
        "linkbox"
    ).innerHTML =

    `
    <a
    href="${winner.url}"
    style="
    background:#3b82f6;
    color:white;
    padding:12px 24px;
    border-radius:10px;
    text-decoration:none;
    display:inline-block;
    font-size:18px;
    margin-bottom:12px;
    ">
    View Character
    </a>

    <br>

    <button
    onclick="reroll()"
    style="
    background:#2bb6a8;
    color:white;
    border:none;
    padding:18px 36px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    ">
    🔄 ROLL AGAIN
    </button>
    `;

}

function reroll() {

    clearTimeout(
        spinTimeout
    );

    document.getElementById(
        "linkbox"
    ).innerHTML = "";

    document.getElementById(
        "namebox"
    ).innerText =
        "Digging through character pile...";

    spinSpeed = 100;

    isSlowingDown = false;

    spin();

}

document.getElementById(
    "namebox"
).innerText =
    "Digging through character pile...";

spin();

</script>
